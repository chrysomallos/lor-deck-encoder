name: Publish npm package

on:
  push:
    branches:
      - master
    tags:
      - 'v*'
  release:
    types: [published]

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 26.x
          registry-url: https://registry.npmjs.org
          always-auth: true

      - name: Enable corepack
        shell: bash
        run: corepack enable

      - name: Install dependencies
        uses: borales/actions-yarn@v4
        with:
          cmd: install --immutable

      - name: Run unit tests
        uses: borales/actions-yarn@v4
        with:
          cmd: test:ci

      - name: Build types
        uses: borales/actions-yarn@v4
        with:
          cmd: build:types

      - name: Publish to npm
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
